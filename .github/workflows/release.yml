name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build mclip binary (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          cargo build --bin mclip --release --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          cp src-tauri/target/${{ matrix.target }}/release/mclip src-tauri/binaries/mclip-${{ matrix.target }}

      - name: Build mclip binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --bin mclip --release --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml
          New-Item -Force -ItemType Directory src-tauri/binaries | Out-Null
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/mclip.exe" "src-tauri/binaries/mclip-${{ matrix.target }}.exe"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional — add these secrets to enable notarization)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MonoClip ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
